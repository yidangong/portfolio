# Node.js React Web App to Linux on Azure
# Build a Node.js React app and deploy it to Azure as a Linux web app.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/javascript

trigger:
- main

variables:

  # Azure Resource Manager connection created during pipeline creation
  azureSubscription: '9da90d72-72e4-4ac9-88cd-e97b6ca6430f'

  # Web app name
  webAppName: 'yidangong-portfolio'

  # Environment name
  environmentName: 'yidangong-portfolio'

  # Agent VM image name
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)

    steps:
    - task: ArchiveFiles@2
      displayName: 'Archive files'
      inputs:
        rootFolderOrFile: '$(System.DefaultWorkingDirectory)'
        includeRootFolder: false
        archiveType: zip
        archiveFile: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
        replaceExistingArchive: true

    - upload: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
      artifact: drop

- stage: Deploy
  displayName: Deploy stage
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: Deploy
    displayName: Deploy
    environment: $(environmentName)
    pool:
      vmImage: $(vmImageName)
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureAppServiceManage@0
            displayName: 'Stop App Service before deploy'
            inputs:
              azureSubscription: $(azureSubscription)
              Action: 'Stop Azure App Service'
              WebAppName: $(webAppName)
          - task: AzureRmWebAppDeployment@4
            displayName: 'Azure App Service Deploy: yidangong-portfolio'
            retryCountOnTaskFailure: 3
            inputs:
              azureSubscription: $(azureSubscription)
              appType: webAppLinux
              WebAppName: $(webAppName)
              packageForLinux: '$(Pipeline.Workspace)/drop/$(Build.BuildId).zip'
              RuntimeStack: 'NODE|24-lts'
              StartupCommand: 'yarn start'
          - task: AzureAppServiceManage@0
            displayName: 'Start App Service after deploy'
            condition: always()
            inputs:
              azureSubscription: $(azureSubscription)
              Action: 'Start Azure App Service'
              WebAppName: $(webAppName)